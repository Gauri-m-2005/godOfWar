<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile Panel</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --accent: #534ab7;
        --accent-light: #eeedfe;
        --accent-mid: #7f77dd;
        --font-size-base: 14px;
      }

      [data-theme="light"] {
        --bg: #f4f3ef;
        --surface: #ffffff;
        --surface2: #f1efe9;
        --surface3: #e8e5dc;
        --txt: #1c1b18;
        --txt2: #5a5850;
        --txt3: #9a9890;
        --border: #dedad0;
        --border2: #ccc9be;
        --shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
      }

      [data-theme="dark"] {
        --bg: #16150f;
        --surface: #1f1e18;
        --surface2: #28271f;
        --surface3: #333228;
        --txt: #f0ede4;
        --txt2: #a8a59c;
        --txt3: #6a6860;
        --border: #3a3830;
        --border2: #4a4840;
        --shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        --accent-light: #2a2660;
      }

      body {
        font-family: "DM Sans", system-ui, sans-serif;
        font-size: var(--font-size-base);
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 28px 16px;
        color: var(--txt);
        transition:
          background 0.3s,
          color 0.3s;
      }
      /* From Uiverse.io by xopc333 */
      .button {
        display: block;
        position: relative;
        width: 40px;
        height: 40px;
        margin: 0;
        overflow: hidden;
        outline: none;
        background-color: transparent;
        cursor: pointer;
        border: 0;
      }

      .button:before,
      .button:after {
        content: "";
        position: absolute;
        border-radius: 50%;
        inset: 7px;
      }

      .button:before {
        border: 4px solid #202020;
        transition:
          opacity 0.4s cubic-bezier(0.77, 0, 0.175, 1) 80ms,
          transform 0.5s cubic-bezier(0.455, 0.03, 0.515, 0.955) 80ms;
      }

      .button:after {
        border: 4px solid #0b7a9f;
        transform: scale(1.3);
        transition:
          opacity 0.4s cubic-bezier(0.165, 0.84, 0.44, 1),
          transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        opacity: 0;
      }

      .button:hover:before,
      .button:focus:before {
        opacity: 0;
        transform: scale(0.7);
        transition:
          opacity 0.4s cubic-bezier(0.165, 0.84, 0.44, 1),
          transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      .button:hover:after,
      .button:focus:after {
        opacity: 1;
        transform: scale(1);
        transition:
          opacity 0.4s cubic-bezier(0.77, 0, 0.175, 1) 80ms,
          transform 0.5s cubic-bezier(0.455, 0.03, 0.515, 0.955) 80ms;
      }

      .button-box {
        display: flex;
        position: absolute;
        top: 0;
        left: 0;
      }

      .button-elem {
        display: block;
        width: 14px;
        height: 14px;
        margin: 12px 20px 0px 13px;
        transform: rotate(180deg);
        fill: #000000;
      }

      .button:hover .button-box,
      .button:focus .button-box {
        transition: 0.4s;
        transform: translateX(-47px);
      }

      /* ── Toast Notifications ── */
      .toast-container {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: none;
      }

      .toast {
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 4px solid var(--accent);
        border-radius: 12px;
        padding: 12px 14px;
        min-width: 290px;
        max-width: 340px;
        box-shadow: var(--shadow);
        pointer-events: all;
        animation: toastIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        display: flex;
        gap: 11px;
        align-items: flex-start;
      }

      .toast.removing {
        animation: toastOut 0.25s ease forwards;
      }

      .toast-thumb {
        width: 38px;
        height: 38px;
        border-radius: 7px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        background: var(--accent-light);
      }

      .toast-body {
        flex: 1;
        min-width: 0;
      }

      .toast-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .toast-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--txt);
        margin: 1px 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .toast-sub {
        font-size: 11px;
        color: var(--txt2);
      }

      .toast-close {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--txt3);
        font-size: 16px;
        padding: 0;
        line-height: 1;
        flex-shrink: 0;
      }

      .toast-close:hover {
        color: var(--txt);
      }

      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateX(40px);
        }

        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes toastOut {
        from {
          opacity: 1;
          transform: translateX(0);
        }

        to {
          opacity: 0;
          transform: translateX(40px);
        }
      }

      /* ── Notification Bell Dropdown ── */
      .notif-wrapper {
        position: relative;
      }

      .notif-bell {
        position: relative;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--surface2);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.15s;
      }

      .notif-bell:hover {
        background: var(--surface3);
      }

      .notif-badge {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 8px;
        height: 8px;
        background: #e24b4a;
        border-radius: 50%;
        border: 1.5px solid var(--surface);
        display: none;
      }

      .notif-dropdown {
        display: none;
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        width: 310px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: var(--shadow);
        z-index: 999;
        overflow: hidden;
      }

      .notif-dropdown.open {
        display: block;
      }

      .notif-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px 10px;
        border-bottom: 1px solid var(--border);
      }

      .notif-header span {
        font-size: 13px;
        font-weight: 600;
        color: var(--txt);
      }

      .notif-mark-read {
        font-size: 11px;
        color: var(--accent);
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
      }

      .notif-list {
        max-height: 280px;
        overflow-y: auto;
      }

      .notif-item {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.12s;
      }

      .notif-item:last-child {
        border-bottom: none;
      }

      .notif-item:hover {
        background: var(--surface2);
      }

      .notif-item.unread {
        background: var(--accent-light);
      }

      .notif-vid-thumb {
        width: 48px;
        height: 32px;
        border-radius: 5px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }

      .notif-item-body {
        flex: 1;
        min-width: 0;
      }

      .notif-item-title {
        font-size: 12px;
        font-weight: 500;
        color: var(--txt);
        line-height: 1.4;
      }

      .notif-item-meta {
        font-size: 11px;
        color: var(--txt3);
        margin-top: 2px;
      }

      .notif-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        flex-shrink: 0;
        margin-top: 5px;
      }

      /* ── Panel Layout ── */
      .panel-wrap {
        width: 100%;
        max-width: 920px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        padding: 0 4px;
      }

      .topbar-left {
        display: flex;
        flex-direction: row;
      }
      .topbar-left h1 {
        font-size: 18px;
        font-weight: 600;
        color: var(--txt);
        margin-top: 7px;
      }

      .topbar-right {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .panel {
        display: flex;
        width: 100%;
        min-height: 600px;
        border: 1px solid var(--border);
        border-radius: 18px;
        overflow: hidden;
        background: var(--surface);
        box-shadow: var(--shadow);
        transition:
          background 0.3s,
          border-color 0.3s;
      }

      /* ── Sidebar ── */
      .sidebar {
        width: 215px;
        flex-shrink: 0;
        background: var(--surface2);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        transition: background 0.3s;
      }

      .profile-header {
        position: relative;
      }

      .banner-area {
        height: 72px;
        background: linear-gradient(135deg, #afa9ec 0%, #7f77dd 100%);
        cursor: pointer;
        overflow: hidden;
        position: relative;
        transition: filter 0.2s;
      }

      .banner-area:hover .banner-overlay {
        opacity: 1;
      }

      .banner-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.2s;
        font-size: 11px;
        font-weight: 500;
        color: #fff;
        gap: 5px;
      }

      .banner-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
      }

      .avatar-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 16px 16px;
        margin-top: -22px;
      }

      .avatar-ring {
        position: relative;
        width: 56px;
        height: 56px;
      }

      .avatar-circle {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: #afa9ec;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 600;
        color: #3c3489;
        border: 3px solid var(--surface2);
        overflow: hidden;
      }

      .avatar-circle img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
      }

      .avatar-cam {
        position: absolute;
        bottom: -1px;
        right: -1px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--surface);
        border: 1.5px solid var(--border2);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .sidebar-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--txt);
        margin-top: 8px;
        text-align: center;
      }

      .sidebar-handle {
        font-size: 11px;
        color: var(--txt3);
      }

      .vis-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 20px;
        margin-top: 4px;
        border: 1px solid transparent;
      }

      .vis-badge.public {
        background: #e1f5ee;
        color: #0f6e56;
        border-color: #9fe1cb;
      }

      .sidebar-nav {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 4px 10px;
        flex: 1;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        color: var(--txt2);
        transition: background 0.15s;
        border: none;
        background: none;
        font-family: inherit;
        width: 100%;
        text-align: left;
      }

      .nav-item:hover {
        background: var(--surface3);
        color: var(--txt);
      }

      .nav-item.active {
        background: var(--surface);
        color: var(--txt);
        font-weight: 600;
        border: 1px solid var(--border);
      }

      .nav-icon {
        width: 15px;
        height: 15px;
        flex-shrink: 0;
      }

      .nav-logout {
        padding: 10px;
        border-top: 1px solid var(--border);
      }

      .logout-btn {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        color: #993c1d;
        width: 100%;
        border: none;
        background: none;
      }

      .logout-btn:hover {
        background: #faece7;
      }

      /* ── Main ── */
      .main {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .section {
        display: none;
        flex-direction: column;
        gap: 14px;
      }

      .section.visible {
        display: flex;
        animation: fadeIn 0.3s ease backwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      .section-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--txt);
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      /* ── Cards / Inputs ── */
      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .info-card {
        background: var(--surface2);
        border-radius: 8px;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .info-label {
        font-size: 10px;
        color: var(--txt3);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .info-value {
        font-size: 13px;
        color: var(--txt);
        font-weight: 500;
      }

      .info-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 500;
        background: #e1f5ee;
        color: #0f6e56;
      }

      .info-full {
        grid-column: 1/-1;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .field-label {
        font-size: 12px;
        color: var(--txt2);
        font-weight: 500;
      }

      .field-input {
        border: 1px solid var(--border2);
        border-radius: 8px;
        padding: 9px 12px;
        font-size: 13px;
        font-family: inherit;
        background: var(--surface);
        color: var(--txt);
        outline: none;
        transition: border-color 0.15s;
      }

      .field-input:focus {
        border-color: var(--accent-mid);
      }

      .settings-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .btn-sm {
        padding: 7px 15px;
        border-radius: 8px;
        border: 1px solid var(--border2);
        font-size: 13px;
        cursor: pointer;
        font-family: inherit;
        background: var(--surface);
        color: var(--txt);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .btn-sm:hover {
        background: var(--surface2);
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .btn-primary:hover {
        opacity: 0.88;
      }

      .save-banner {
        background: #eaf3de;
        border: 1px solid #c0dd97;
        border-radius: 8px;
        padding: 9px 14px;
        font-size: 13px;
        color: #3b6d11;
        display: none;
      }

      .save-banner.visible {
        display: block;
      }

      /* ── Password ── */
      .strength-bar {
        display: flex;
        gap: 4px;
        margin-top: 6px;
      }

      .strength-seg {
        flex: 1;
        height: 3px;
        border-radius: 2px;
        background: var(--surface3);
      }

      .pw-toggle {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--txt3);
        padding: 0;
      }

      .pw-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }

      .pw-wrap .field-input {
        flex: 1;
        padding-right: 36px;
      }

      .pw-wrap .pw-toggle {
        position: absolute;
        right: 10px;
      }

      /* ── Toggle switch ── */
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        background: var(--surface2);
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      .toggle-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--txt);
      }

      .toggle-sub {
        font-size: 12px;
        color: var(--txt2);
        margin-top: 1px;
      }

      .toggle-switch {
        width: 40px;
        height: 22px;
        border-radius: 11px;
        background: var(--surface3);
        border: 1px solid var(--border2);
        cursor: pointer;
        position: relative;
        transition: background 0.25s;
      }

      .toggle-switch.on {
        background: var(--accent);
        border-color: var(--accent);
      }

      .toggle-thumb {
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        transition: left 0.25s;
      }

      .toggle-switch.on .toggle-thumb {
        left: 20px;
      }

      .vis-options {
        display: flex;
        gap: 10px;
      }

      .vis-opt {
        flex: 1;
        padding: 12px 10px;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        cursor: pointer;
        text-align: center;
      }

      .vis-opt.selected.public {
        border-color: #0f6e56;
        background: #e1f5ee;
      }

      .video-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .video-card {
        background: var(--surface2);
        border-radius: 8px;
        border: 1px solid var(--border);
        overflow: hidden;
        transition: transform 0.3s;
      }

      .video-card:hover {
        transform: translateY(-5px);
      }

      .video-thumb {
        aspect-ratio: 16/9;
        overflow: hidden;
      }

      .video-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .video-info {
        padding: 7px 9px;
      }

      .video-title {
        font-size: 12px;
        font-weight: 500;
        color: var(--txt);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .video-meta {
        font-size: 11px;
        color: var(--txt3);
        margin-top: 1px;
      }

      .bio-box {
        background: var(--surface2);
        border-radius: 8px;
        padding: 13px 15px;
      }

      .bio-text {
        font-size: 13px;
        color: var(--txt2);
        line-height: 1.6;
        min-height: 44px;
      }

      .bio-edit-area {
        width: 100%;
        font-size: 13px;
        background: var(--surface);
        border: 1px solid var(--border2);
        border-radius: 8px;
        padding: 9px 11px;
        min-height: 72px;
        display: none;
        outline: none;
      }

      .bio-actions {
        display: flex;
        gap: 7px;
        margin-top: 9px;
      }

      .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 4px 0;
      }

      @media (max-width: 640px) {
        .panel {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
        }

        .video-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="panel-wrap">
      <div class="topbar">
        <div class="topbar-left">
          <!-- From Uiverse.io by xopc333 -->
          <button class="button" onclick="redirectHome()">
            <div class="button-box">
              <span class="button-elem">
                <svg viewBox="0 0 46 40" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M46 20.038c0-.7-.3-1.5-.8-2.1l-16-17c-1.1-1-3.2-1.4-4.4-.3-1.2 1.1-1.2 3.3 0 4.4l11.3 11.9H3c-1.7 0-3 1.3-3 3s1.3 3 3 3h33.1l-11.3 11.9c-1 1-1.2 3.3 0 4.4 1.2 1.1 3.3.8 4.4-.3l16-17c.5-.5.8-1.1.8-1.9z"
                  ></path>
                </svg>
              </span>
              <span class="button-elem">
                <svg viewBox="0 0 46 40">
                  <path
                    d="M46 20.038c0-.7-.3-1.5-.8-2.1l-16-17c-1.1-1-3.2-1.4-4.4-.3-1.2 1.1-1.2 3.3 0 4.4l11.3 11.9H3c-1.7 0-3 1.3-3 3s1.3 3 3 3h33.1l-11.3 11.9c-1 1-1.2 3.3 0 4.4 1.2 1.1 3.3.8 4.4-.3l16-17c.5-.5.8-1.1.8-1.9z"
                  ></path>
                </svg>
              </span>
            </div>
          </button>
          <h1>My Profile</h1>
        </div>
        <div class="topbar-right">
          <div class="notif-wrapper" id="notifWrapper">
            <div
              class="notif-bell"
              onclick="toggleNotifDropdown()"
              id="notifBell"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path
                  d="M8 1a5 5 0 00-5 5v2.5L1.5 11h13L13 8.5V6a5 5 0 00-5-5z"
                />
                <path d="M6.5 13a1.5 1.5 0 003 0" />
              </svg>
              <div class="notif-badge" id="notifBadge"></div>
            </div>
            <div class="notif-dropdown" id="notifDropdown">
              <div class="notif-header">
                <span>Notifications</span>
                <button class="notif-mark-read" onclick="markAllRead()">
                  Mark all read
                </button>
              </div>
              <div class="notif-list" id="notifList"></div>
            </div>
          </div>
          <div class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</div>
        </div>
      </div>

      <div class="panel">
        <div class="sidebar">
          <div class="profile-header">
            <div
              class="banner-area"
              id="bannerArea"
              onclick="document.getElementById('bannerInput').click()"
            >
              <img id="bannerImg" class="banner-img" alt="banner" />
              <div class="banner-overlay">Change banner</div>
            </div>
            <input
              type="file"
              id="bannerInput"
              accept="image/*"
              style="display: none"
              onchange="uploadBanner(event)"
            />

            <div class="avatar-section">
              <div class="avatar-ring">
                <div class="avatar-circle" id="avatarCircle">
                  <img id="avatarImg" alt="avatar" />
                  <span id="avatarInitials">SA</span>
                </div>
                <div
                  class="avatar-cam"
                  onclick="document.getElementById('avatarInput').click()"
                >
                  📸
                </div>
                <input
                  type="file"
                  id="avatarInput"
                  accept="image/*"
                  style="display: none"
                  onchange="uploadAvatar(event)"
                />
              </div>
              <div class="sidebar-name" id="sidebarName">User</div>
              <div class="sidebar-handle" id="sidebarHandle">@user</div>
              <div class="vis-badge public">
                <span>🌐</span><span>Public</span>
              </div>
            </div>
          </div>

          <div class="sidebar-nav">
            <button
              class="nav-item active"
              onclick="showSection('overview', this)"
            >
              Overview
            </button>
            <button class="nav-item" onclick="showSection('bio', this)">
              Bio
            </button>
            <button class="nav-item" onclick="showSection('videos', this)">
              My Videos
            </button>
            <button class="nav-item" onclick="showSection('security', this)">
              Security
            </button>
            <button class="nav-item" onclick="showSection('personalize', this)">
              Personalize
            </button>
            <button class="nav-item" onclick="showSection('settings', this)">
              Account
            </button>
          </div>

          <div class="nav-logout">
            <button class="logout-btn" onclick="handleLogout()">Log out</button>
          </div>
        </div>

        <div class="main">
          <div class="section visible" id="section-overview">
            <div class="section-title">Profile Overview</div>
            <div class="info-grid">
              <div class="info-card">
                <div class="info-label">Full Name</div>
                <div class="info-value" id="ov-name"></div>
              </div>
              <div class="info-card">
                <div class="info-label">Email</div>
                <div class="info-value" id="ov-email"></div>
              </div>
              <div class="info-card">
                <div class="info-label">Username</div>
                <div class="info-value" id="ov-username"></div>
              </div>
              <div class="info-card">
                <div class="info-label">Status</div>
                <div class="info-value">
                  <span class="info-badge">Active</span>
                </div>
              </div>
              <div class="info-card info-full">
                <div class="info-label">Bio</div>
                <div class="info-value" id="ov-bio">No bio yet.</div>
              </div>
            </div>
          </div>

          <div class="section" id="section-bio">
            <div class="section-title">Your Bio</div>
            <div class="bio-box">
              <div class="bio-text" id="bio-display">No bio yet.</div>
              <textarea
                class="bio-edit-area"
                id="bio-textarea"
                maxlength="200"
              ></textarea>
              <div class="bio-actions">
                <button
                  class="btn-sm"
                  id="edit-bio-btn"
                  onclick="toggleBioEdit()"
                >
                  Edit Bio
                </button>
                <button
                  class="btn-sm btn-primary"
                  id="save-bio-btn"
                  onclick="saveBio()"
                  style="display: none"
                >
                  Save
                </button>
                <button
                  class="btn-sm"
                  id="cancel-bio-btn"
                  onclick="cancelBio()"
                  style="display: none"
                >
                  Cancel
                </button>
              </div>
            </div>
          </div>

          <div class="section" id="section-videos">
            <div class="section-title">Uploaded Videos</div>
            <div class="video-grid" id="video-grid"></div>
          </div>

          <div class="section" id="section-security">
            <div class="section-title">Change Password</div>
            <div class="field-group">
              <label class="field-label">Current Password</label
              ><input class="field-input" type="password" id="pw-current" />
            </div>
            <div class="field-group">
              <label class="field-label">New Password</label
              ><input class="field-input" type="password" id="pw-new" />
            </div>
            <div class="field-group">
              <label class="field-label">Confirm Password</label
              ><input class="field-input" type="password" id="pw-confirm" />
            </div>
            <div>
              <button class="btn-sm btn-primary" onclick="savePassword()">
                Update Password
              </button>
            </div>
          </div>

          <div class="section" id="section-personalize">
            <div class="section-title">Appearance</div>
            <div class="toggle-row">
              <div class="toggle-title">Dark Mode</div>
              <div
                class="toggle-switch"
                id="dark-toggle"
                onclick="toggleThemeSwitch(this)"
              >
                <div class="toggle-thumb"></div>
              </div>
            </div>
          </div>

          <div class="section" id="section-settings">
            <div class="section-title">Account Settings</div>
            <div class="save-banner" id="save-banner">
              Changes saved successfully.
            </div>
            <div class="settings-grid">
              <div class="field-group" style="grid-column: 1/-1">
                <label class="field-label">Full Name</label
                ><input class="field-input" id="s-fname" />
              </div>
              <div class="field-group" style="grid-column: 1/-1">
                <label class="field-label">Email</label
                ><input class="field-input" id="s-email" type="email" />
              </div>
            </div>
            <div style="margin-top: 15px">
              <button class="btn-sm btn-primary" onclick="saveSettings()">
                Save Changes
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { db } from "./firebase.js";
      import {
        collection,
        getDocs,
        doc,
        updateDoc,
        setDoc,
        query,
        where,
      } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

      function requireAuth() {
        const user = JSON.parse(localStorage.getItem("user"));
        if (!user) {
          window.location.href = "login_page.html";
          return null;
        }
        return user;
      }
      const currentUser = requireAuth();

      window.redirectHome = function () {
        window.location.href = "index.html";
      };
      
      async function initVideos() {
        if (!currentUser) return;
        try {
          const querySnapshot = await getDocs(collection(db, "videos"));
          const myVideos = [];
          querySnapshot.forEach((docSnap) => {
            const data = docSnap.data();
            if (data.uploaderId === currentUser.id)
              myVideos.push({ id: docSnap.id, ...data });
          });
          const grid = document.getElementById("video-grid");
          if (grid) {
            grid.innerHTML = myVideos
              .map(
                (v) => `
            <div class="video-card">
              <div class="video-thumb"><a href="video_player_page_ui.html?id=${v.id}" target="_blank"><img src="${v.thumbnailUrl || v.url.replace(/\.[^/.]+$/, ".jpg")}"></a></div>
              <div class="video-info"><div class="video-title">${v.title}</div><div class="video-meta">${v.uploadedAt && v.uploadedAt.toDate ? v.uploadedAt.toDate().toLocaleDateString() : "N/A"}</div></div>
            </div>`,
              )
              .join("");
            if (myVideos.length === 0)
              grid.innerHTML =
                "<p style='padding:20px;color:var(--txt2)'>No videos uploaded.</p>";
          }
        } catch (err) {
          console.error(err);
        }
      }

      async function loadNotifications() {
        if (!currentUser) return;
        try {
          const q = query(
            collection(db, "notifications"),
            where("userId", "==", currentUser.id),
          );
          const querySnapshot = await getDocs(q);
          const notifications = [];
          querySnapshot.forEach((docSnap) =>
            notifications.push({ id: docSnap.id, ...docSnap.data() }),
          );
          const list = document.getElementById("notifList");
          const badge = document.getElementById("notifBadge");
          if (list) {
            list.innerHTML = notifications
              .map(
                (n) =>
                  `<div class="notif-item"><div class="notif-item-body"><div class="notif-item-title">Notification</div><div class="notif-item-meta">${n.message}</div></div></div>`,
              )
              .join("");
            if (notifications.length === 0)
              list.innerHTML = `<div style="padding:14px;text-align:center;">No notifications</div>`;
          }
          if (badge)
            badge.style.display = notifications.length > 0 ? "block" : "none";
        } catch (err) {
          console.error(err);
        }
      }

      window.showSection = function (name, navEl) {
        document
          .querySelectorAll(".section")
          .forEach((s) => s.classList.remove("visible"));
        document
          .querySelectorAll(".nav-item")
          .forEach((n) => n.classList.remove("active"));
        const target = document.getElementById("section-" + name);
        if (target) target.classList.add("visible");
        if (navEl) navEl.classList.add("active");
      };

      window.toggleBioEdit = function () {
        const d = document.getElementById("bio-display"),
          a = document.getElementById("bio-textarea");
        a.value = d.textContent;
        d.style.display = "none";
        a.style.display = "block";
        document.getElementById("edit-bio-btn").style.display = "none";
        document.getElementById("save-bio-btn").style.display = "inline-flex";
        document.getElementById("cancel-bio-btn").style.display = "inline-flex";
        a.focus();
      };

      window.saveBio = async function () {
        const newBio =
          document.getElementById("bio-textarea").value.trim() || "No bio yet.";
        try {
          document.getElementById("save-bio-btn").innerText = "Saving...";
          await setDoc(
            doc(db, "users", currentUser.id),
            { bio: newBio },
            { merge: true },
          );
          currentUser.bio = newBio;
          localStorage.setItem("user", JSON.stringify(currentUser));
          document.getElementById("bio-display").textContent = newBio;
          document.getElementById("ov-bio").textContent = newBio;
          window.cancelBio();
          showBanner("save-banner");
        } catch (err) {
          alert("Failed to save bio");
        } finally {
          document.getElementById("save-bio-btn").innerText = "Save";
        }
      };

      window.cancelBio = function () {
        document.getElementById("bio-display").style.display = "block";
        document.getElementById("bio-textarea").style.display = "none";
        document.getElementById("edit-bio-btn").style.display = "inline-flex";
        document.getElementById("save-bio-btn").style.display = "none";
        document.getElementById("cancel-bio-btn").style.display = "none";
      };

      window.saveSettings = async function () {
        const n = document.getElementById("s-fname").value.trim(),
          e = document.getElementById("s-email").value.trim();
        if (!n || !e) return alert("Required fields missing");
        try {
          await setDoc(
            doc(db, "users", currentUser.id),
            { name: n, email: e },
            { merge: true },
          );
          currentUser.name = n;
          currentUser.email = e;
          localStorage.setItem("user", JSON.stringify(currentUser));
          document.getElementById("sidebarName").textContent = n;
          document.getElementById("ov-name").textContent = n;
          document.getElementById("ov-email").textContent = e;
          showBanner("save-banner");
        } catch (err) {
          console.error(err);
          alert("Failed to update settings. Make sure you are connected.");
        }
      };

      window.savePassword = async function () {
        const c = document.getElementById("pw-current").value,
          n = document.getElementById("pw-new").value,
          f = document.getElementById("pw-confirm").value;
        if (!c || !n || !f) return alert("Fill all fields");
        if (c !== currentUser.password) return alert("Current password wrong");
        if (n !== f) return alert("Mismatch");
        try {
          await setDoc(
            doc(db, "users", currentUser.id),
            { password: n },
            { merge: true },
          );
          currentUser.password = n;
          localStorage.setItem("user", JSON.stringify(currentUser));
          alert("Password updated");
        } catch (err) {
          alert("Error");
        }
      };

      window.toggleTheme = function () {
        const r = document.documentElement;
        const next = r.getAttribute("data-theme") === "dark" ? "light" : "dark";
        r.setAttribute("data-theme", next);
        document.getElementById("themeBtn").textContent =
          next === "dark" ? "☀️" : "🌙";
      };
      window.toggleThemeSwitch = function (sw) {
        sw.classList.toggle("on");
        window.toggleTheme();
      };
      window.toggleNotifDropdown = function () {
        document.getElementById("notifDropdown").classList.toggle("open");
      };
      window.handleLogout = function () {
        if (confirm("Logout?")) {
          localStorage.removeItem("user");
          window.location.href = "login_page.html";
        }
      };
      function showBanner(id) {
        const b = document.getElementById(id);
        if (b) {
          b.classList.add("visible");
          setTimeout(() => b.classList.remove("visible"), 3000);
        }
      }

      /* ── Image Uploads (Cloudinary) ── */
      async function uploadToCloudinary(file) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", "StremeAsia_Videos");
        const res = await fetch(
          "https://api.cloudinary.com/v1_1/dvz522def/image/upload",
          {
            method: "POST",
            body: formData,
          },
        );
        if (!res.ok) throw new Error("Upload failed");
        return await res.json();
      }

      window.uploadAvatar = async function (e) {
        const file = e.target.files[0];
        if (!file) return;
        try {
          // Show local preview immediately
          const reader = new FileReader();
          reader.onload = (ev) => {
            const img = document.getElementById("avatarImg");
            if (img) {
              img.src = ev.target.result;
              img.style.display = "block";
            }
            const initials = document.getElementById("avatarInitials");
            if (initials) initials.style.display = "none";
          };
          reader.readAsDataURL(file);

          // Upload to Cloud
          const data = await uploadToCloudinary(file);
          const url = data.secure_url;

          // Save to Firestore
          await setDoc(
            doc(db, "users", currentUser.id),
            { avatarUrl: url },
            { merge: true },
          );

          // Update local session
          currentUser.avatarUrl = url;
          localStorage.setItem("user", JSON.stringify(currentUser));
          showBanner("save-banner");
        } catch (err) {
          console.error(err);
          alert("Photo upload failed");
        }
      };

      window.uploadBanner = async function (e) {
        const file = e.target.files[0];
        if (!file) return;
        try {
          // Preview
          const reader = new FileReader();
          reader.onload = (ev) => {
            const img = document.getElementById("bannerImg");
            if (img) {
              img.src = ev.target.result;
              img.style.display = "block";
            }
          };
          reader.readAsDataURL(file);

          // Upload
          const data = await uploadToCloudinary(file);
          const url = data.secure_url;

          // Save
          await setDoc(
            doc(db, "users", currentUser.id),
            { bannerUrl: url },
            { merge: true },
          );

          // Update local
          currentUser.bannerUrl = url;
          localStorage.setItem("user", JSON.stringify(currentUser));
          showBanner("save-banner");
        } catch (err) {
          console.error(err);
          alert("Banner upload failed");
        }
      };

      window.initUserData = function () {
        if (!currentUser) return;
        document.getElementById("sidebarName").textContent =
          currentUser.name || "User";
        document.getElementById("sidebarHandle").textContent =
          "@" + (currentUser.name || "user").replace(/\s+/g, "").toLowerCase();
        document.getElementById("ov-name").textContent =
          currentUser.name || "N/A";
        document.getElementById("ov-email").textContent =
          currentUser.email || "N/A";
        document.getElementById("ov-username").textContent =
          currentUser.id || "N/A";
        document.getElementById("ov-bio").textContent =
          currentUser.bio || "No bio yet.";
        document.getElementById("bio-display").textContent =
          currentUser.bio || "No bio yet.";

        if (document.getElementById("s-fname"))
          document.getElementById("s-fname").value = currentUser.name || "";
        if (document.getElementById("s-email"))
          document.getElementById("s-email").value = currentUser.email || "";

        // Load Avatar
        const avImg = document.getElementById("avatarImg");
        const avInit = document.getElementById("avatarInitials");
        if (currentUser.avatarUrl) {
          if (avImg) {
            avImg.src = currentUser.avatarUrl;
            avImg.style.display = "block";
          }
          if (avInit) avInit.style.display = "none";
        } else {
          const initials = (currentUser.name || "U")
            .split(" ")
            .map((w) => w[0])
            .join("")
            .toUpperCase()
            .substring(0, 2);
          if (avInit) avInit.textContent = initials;
        }

        // Load Banner
        const bnImg = document.getElementById("bannerImg");
        if (currentUser.bannerUrl && bnImg) {
          bnImg.src = currentUser.bannerUrl;
          bnImg.style.display = "block";
        }
      };

      document.addEventListener("DOMContentLoaded", () => {
        window.initUserData();
        initVideos();
        loadNotifications();
      });
      document.addEventListener("click", (e) => {
        if (!document.getElementById("notifWrapper").contains(e.target))
          document.getElementById("notifDropdown").classList.remove("open");
      });
    </script>
  </body>
</html>
