<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="Login_page.css" />
  </head>

  <body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="right-panel">
      <div class="auth-card">
        <div class="tab-row">
          <button class="tab-btn active" onclick="switchTab('login')">
            Sign In
          </button>
          <button class="tab-btn" onclick="switchTab('reg')">Register</button>
        </div>

        <!-- LOGIN -->
        <div id="loginForm">
          <div class="field">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@college.edu" />
          </div>

          <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="******" />
          </div>

          <div id="loginErr" class="err-msg hidden"></div>

          <button class="submit-btn" onclick="doLogin()">Sign In</button>
        </div>

        <!-- REGISTER -->
        <div id="regForm" class="hidden">
          <div class="field">
            <label>Name</label>
            <input type="text" id="regName" placeholder="Enter your name" />
          </div>

          <div class="field">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="you@college.edu" />
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px">
            <div class="field">
              <label>Student ID</label>
              <input
                type="text"
                id="regStudId"
                placeholder="Enter your student ID"
              />
            </div>

            <div class="field">
              <label>Department</label>
              <select id="regDept">
                <option>Computer Science</option>
                <option>Software</option>
                <option>Electronics</option>
                <option>Mechanical</option>
                <option>Civil</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label>Password</label>
            <input type="password" id="regPwd" placeholder="••••••" />
          </div>

          <div id="regMsg" class="hidden"></div>

          <button class="submit-btn" onclick="doRegister()">
            Create Account
          </button>
        </div>
      </div>
    </div>
    <script type="module" src="login_page.js"></script>
  </body>
</html>
