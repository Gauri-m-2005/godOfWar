<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Video Player</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f0f0f;
    color: #fff;
}

.container {
    display: flex;
    height: 100vh;
}

/* LEFT SIDE - PLAYER */
.player-section {
    width: 60%;
    padding: 20px;
}

.video-player {
    width: 100%;
    height: 60vh;
    border-radius: 12px;
    background: black;
}

.video-details {
    margin-top: 15px;
}

.video-title {
    font-size: 22px;
    font-weight: 600;
}

.subject {
    margin-top: 8px;
    font-size: 14px;
    color: #ccc;
}

.description {
    margin-top: 10px;
    line-height: 1.5;
    font-size: 14px;
    color: #ddd;
}

/* RIGHT SIDE - VIDEO LIST */
.sidebar {
    width: 40%;
    padding: 20px;
    overflow-y: auto;
    border-left: 1px solid #222;
}

.video-card {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    cursor: pointer;
    padding: 8px;
    border-radius: 10px;
    transition: 0.3s;
}

.video-card:hover {
    background: #1c1c1c;
}

.video-card video {
    width: 120px;
    height: 70px;
    object-fit: cover;
    border-radius: 8px;
}

.video-info {
    flex: 1;
}

.video-info h4 {
    margin: 0;
    font-size: 14px;
}

.video-info p {
    margin: 3px 0;
    font-size: 12px;
    color: #aaa;
}

</style>
</head>
<body>
    
<div class="container">
        
    <!-- LEFT PLAYER -->
    <div class="player-section">
            <video id="mainVideo" class="video-player" controls></video>

        <div class="video-details">
            <div class="video-title" id="title"></div>
            <div class="subject" id="subject"></div>
            <div class="description" id="desc"></div>
        </div>
    </div>
    
    <!-- RIGHT SIDEBAR -->
    <div class="sidebar" id="videoList"></div>
    
</div>


<script type="module" src="player.js"></script>
</body>
</html>
